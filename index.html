<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Calculator</title>
<link rel="icon" href="calculator.ico">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            keyframes: {
                fadeIn: {
                    '0%': { opacity: '0', transform: 'translateY(8px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' }
                },
                glow: {
                    '0%, 100%': { boxShadow: '0 0 0 0 rgba(245,158,11,0.45)' },
                    '50%': { boxShadow: '0 0 18px 4px rgba(245,158,11,0.55)' }
                }
            },
            animation: {
                fadeIn: 'fadeIn .45s ease both',
                glow: 'glow 2.2s ease-in-out infinite'
            }
        }
    }
};
</script>
</head>
<body class="relative min-h-screen overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-purple-50 text-slate-800 flex items-center justify-center p-4">

<div class="pointer-events-none absolute -top-24 -left-24 h-72 w-72 rounded-full bg-indigo-300/30 blur-3xl"></div>
<div class="pointer-events-none absolute -bottom-24 -right-24 h-72 w-72 rounded-full bg-purple-300/30 blur-3xl"></div>
<div class="pointer-events-none absolute inset-0 opacity-50" style="background-image:radial-gradient(rgba(99,102,241,0.12) 1px, transparent 1px);background-size:22px 22px;"></div>

<main class="relative w-full max-w-md bg-white/90 backdrop-blur rounded-2xl shadow-xl ring-1 ring-slate-200 p-8">
    <div class="relative mx-auto mb-3 h-14 w-14">
        <div class="absolute inset-0 rounded-2xl bg-gradient-to-br from-indigo-400 to-purple-500 opacity-60 blur-lg"></div>
        <div class="relative flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2l1.9 4.8L19 8.7l-4.1 3.1L16 17l-4-2.7L8 17l1.1-5.2L5 8.7l5.1-1.9L12 2z"/>
            </svg>
        </div>
    </div>
    <h1 class="text-3xl font-bold text-center bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Numerology Calculator</h1>
    <p class="text-center text-sm text-slate-600 mt-1 mb-7">See your core numbers and what each one says about you</p>

    <form id="numForm" autocomplete="off" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-slate-600 mb-1">Full name</label>
            <div class="relative">
                <span aria-hidden="true" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a7.5 7.5 0 0115 0"/>
                    </svg>
                </span>
                <input id="name" type="text" autofocus placeholder="e.g. Priya Sharma" aria-describedby="nameHint"
                    class="w-full rounded-lg border border-slate-300 bg-slate-50 pl-10 pr-3 py-2.5 text-base text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition">
            </div>
            <p id="nameHint" class="mt-1 text-xs text-slate-500">Use your full birth name for the most accurate reading.</p>
        </div>
        <div>
            <label for="dob" class="block text-sm font-medium text-slate-600 mb-1">Date of birth</label>
            <div class="relative">
                <span aria-hidden="true" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 z-10 text-slate-400">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 8.25h18M4.5 5.25h15A1.5 1.5 0 0121 6.75v12A1.5 1.5 0 0119.5 20.25h-15A1.5 1.5 0 013 18.75v-12A1.5 1.5 0 014.5 5.25z"/>
                    </svg>
                </span>
                <input id="dob" type="text" placeholder="DD/MM/YYYY" aria-describedby="dobHint"
                    class="w-full rounded-lg border border-slate-300 bg-slate-50 pl-10 pr-3 py-2.5 text-base text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition">
            </div>
            <p id="dobHint" class="mt-1 text-xs text-slate-500">Format: DD / MM / YYYY</p>
        </div>
        <button type="submit"
            class="flex w-full items-center justify-center gap-2 rounded-lg bg-gradient-to-r from-indigo-600 to-purple-600 px-4 py-3 text-base font-semibold text-white shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6M9 11h6m-6 4h3M6.75 3h10.5A1.75 1.75 0 0119 4.75v14.5A1.75 1.75 0 0117.25 21H6.75A1.75 1.75 0 015 19.25V4.75A1.75 1.75 0 016.75 3z"/>
            </svg>
            Calculate
        </button>
    </form>

    <div id="result" role="status" aria-live="polite" class="mt-6 space-y-3"></div>

    <p class="mt-6 text-center text-xs text-slate-500">Based on classic Indian numerology. For guidance and fun — not certainty.</p>
</main>

<script>
const meanings = {
    1: 'Leadership, independence and fresh starts.',
    2: 'Harmony, partnership and sensitivity.',
    3: 'Creativity, expression and joy.',
    4: 'Stability, discipline and hard work.',
    5: 'Freedom, change and adventure.',
    6: 'Care, responsibility and family.',
    7: 'Wisdom, spirituality and deep thinking.',
    8: 'Power, ambition and abundance.',
    9: 'Compassion, completion and service.',
    11: 'Master Number — intuition, inspiration and vision.',
    22: 'Master Number — the master builder, big dreams made real.',
    33: 'Master Number — the master teacher, healing and guidance.'
};

const badgeGrad = {
    1: 'from-rose-400 to-rose-600',
    2: 'from-orange-400 to-amber-500',
    3: 'from-amber-400 to-yellow-500',
    4: 'from-lime-400 to-green-600',
    5: 'from-emerald-400 to-teal-600',
    6: 'from-cyan-400 to-sky-600',
    7: 'from-blue-400 to-indigo-600',
    8: 'from-violet-400 to-purple-600',
    9: 'from-fuchsia-400 to-pink-600'
};

const accentBar = {
    1: 'border-l-rose-500',
    2: 'border-l-amber-500',
    3: 'border-l-yellow-500',
    4: 'border-l-green-500',
    5: 'border-l-teal-500',
    6: 'border-l-sky-500',
    7: 'border-l-indigo-500',
    8: 'border-l-purple-500',
    9: 'border-l-pink-500'
};

function reduceNumber(num) {
    while (num > 9 && num !== 11 && num !== 22 && num !== 33) {
        num = num.toString().split('').reduce((a, b) => a + parseInt(b), 0);
    }
    return num;
}

function nameLetterSum(name) {
    const letters = {
        A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,
        J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,
        S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8
    };
    let sum = 0;
    name = name.toUpperCase().replace(/[^A-Z]/g, '');
    for (let char of name) {
        sum += letters[char] || 0;
    }
    return sum;
}

function getNameNumber(name) {
    return reduceNumber(nameLetterSum(name));
}

function reduceTrace(num) {
    const steps = [num];
    while (num > 9 && num !== 11 && num !== 22 && num !== 33) {
        num = num.toString().split('').reduce((a, b) => a + parseInt(b), 0);
        steps.push(num);
    }
    return steps.join(' → ');
}

function getDriverNumber(day) {
    return reduceNumber(parseInt(day));
}

function getConductorNumber(day, month, year) {
    const total = reduceNumber(parseInt(day)) +
                  reduceNumber(parseInt(month)) +
                  reduceNumber(parseInt(year));
    return reduceNumber(total);
}

function isMaster(num) {
    return num === 11 || num === 22 || num === 33;
}

function renderItem(label, sublabel, source, breakdown, num, index) {
    const master = isMaster(num);
    const grad = master ? 'from-amber-300 to-amber-500' : (badgeGrad[num] || 'from-slate-400 to-slate-600');
    const accent = master ? 'border-l-amber-400' : (accentBar[num] || 'border-l-slate-400');
    const cardBox = master ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-200';
    const badge = master
        ? `bg-gradient-to-br ${grad} text-amber-900 shadow-md ring-2 ring-amber-300/70 animate-glow`
        : `bg-gradient-to-br ${grad} text-white shadow-md ring-1 ring-inset ring-white/40`;
    const tag = master
        ? '<span class="inline-flex items-center gap-1 rounded-full bg-amber-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-amber-700"><svg class="h-3 w-3" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.9 4.8L19 8.7l-4.1 3.1L16 17l-4-2.7L8 17l1.1-5.2L5 8.7l5.1-1.9L12 2z"/></svg>Master</span>'
        : '';
    return `
        <div class="group flex items-center gap-4 rounded-xl border border-l-4 ${cardBox} ${accent} p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md hover:ring-1 hover:ring-indigo-200 animate-fadeIn" style="animation-delay:${index * 110}ms">
            <div class="flex h-16 w-16 flex-none items-center justify-center rounded-full text-3xl font-bold transition group-hover:scale-110 ${badge}" style="text-shadow:0 1px 2px rgba(0,0,0,0.18)" aria-label="${label} ${num}">${num}</div>
            <div class="min-w-0">
                <div class="flex flex-wrap items-center gap-2">
                    <span class="font-semibold text-slate-800">${label}</span>
                    <span class="text-xs text-slate-500">(${sublabel})</span>
                    ${tag}
                </div>
                <p class="text-xs text-slate-400 mt-0.5">${source}</p>
                <p class="text-sm text-slate-600 mt-0.5 leading-relaxed">${meanings[num] || ''}</p>
                ${breakdown ? `<p class="mt-1 text-[11px] text-slate-400">${breakdown}</p>` : ''}
            </div>
        </div>`;
}

function showError(msg) {
    document.getElementById('result').innerHTML =
        `<p class="rounded-lg bg-red-50 px-4 py-3 text-sm text-red-600 ring-1 ring-red-200 animate-fadeIn">${msg}</p>`;
}

function calculateNumerology() {
    const name = document.getElementById('name').value.trim();
    const dob = document.getElementById('dob').value;

    if (!name || !dob) {
        showError('Please enter both name and birth date.');
        return;
    }
    if (!/[A-Za-z]/.test(name)) {
        showError('Name must contain at least one letter.');
        return;
    }
    if (dob > new Date().toISOString().split('T')[0]) {
        showError('Birth date cannot be in the future.');
        return;
    }

    const [year, month, day] = dob.split('-');
    const nameNum = getNameNumber(name);
    const driver = getDriverNumber(day);
    const conductor = getConductorNumber(day, month, year);
    const dayR = reduceNumber(parseInt(day));
    const monthR = reduceNumber(parseInt(month));
    const yearR = reduceNumber(parseInt(year));

    lastResultText = `My Numerology Numbers\nName Number (Destiny): ${nameNum}\nDriver Number (Mulank): ${driver}\nConductor Number (Bhagyank): ${conductor}`;

    document.getElementById('result').innerHTML =
        '<p class="border-t border-slate-200 pt-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Your Numbers</p>' +
        renderItem('Name Number', 'Destiny', 'From the letters of your name', `Letters → ${reduceTrace(nameLetterSum(name))}`, nameNum, 0) +
        renderItem('Driver Number', 'Mulank', 'From your day of birth', `Birth day → ${reduceTrace(parseInt(day))}`, driver, 1) +
        renderItem('Conductor Number', 'Bhagyank', 'From your full birth date', `${dayR}+${monthR}+${yearR} → ${reduceTrace(dayR + monthR + yearR)}`, conductor, 2) +
        `<div class="flex items-center gap-2 pt-1">
            <button type="button" onclick="shareResult()" class="flex flex-1 items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 active:scale-[0.98]">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 12a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zm14-5a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zm0 10a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zM7.3 10.8l8.4-3.6M7.3 13.2l8.4 3.6"/></svg>
                Share
            </button>
            <button type="button" onclick="copyResult()" class="flex flex-1 items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 active:scale-[0.98]">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5h6a2 2 0 012 2v10a2 2 0 01-2 2H9a2 2 0 01-2-2V7a2 2 0 012-2zM9 5V4a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>
                <span id="copyLabel">Copy</span>
            </button>
        </div>`;
}

let lastResultText = '';

function shareResult() {
    if (!lastResultText) return;
    if (navigator.share) {
        navigator.share({ title: 'My Numerology Numbers', text: lastResultText }).catch(function () {});
    } else {
        copyResult();
    }
}

function copyResult() {
    if (!lastResultText) return;
    navigator.clipboard.writeText(lastResultText);
    const label = document.getElementById('copyLabel');
    if (label) {
        label.textContent = 'Copied!';
        setTimeout(function () { label.textContent = 'Copy'; }, 1600);
    }
}

flatpickr('#dob', {
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'd/m/Y',
    altInputClass: 'w-full cursor-pointer rounded-lg border border-slate-300 bg-slate-50 pl-10 pr-3 py-2.5 text-base text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition',
    maxDate: 'today',
    allowInput: true
});

document.getElementById('numForm').addEventListener('submit', function (e) {
    e.preventDefault();
    calculateNumerology();
});
</script>
</body>
</html>
